<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" preserveAspectRatio="none">
  <defs>
    <!-- one puffy cloud: bumpy top AND gently scalloped bottom -->
    <path id="puff"
      d="M20,80 C6,80 0,62 14,57 C4,40 28,28 42,40 C48,16 90,14 98,38
         C114,24 144,32 138,56 C156,58 156,80 140,80
         C132,90 118,90 108,80 C96,89 86,89 76,80
         C62,89 50,89 40,80 C32,88 26,87 20,80 Z"/>
  </defs>

  <!-- solid parchment back across the bulk of the bank: this is what
       hides the map when engulfed (gaps between the front clouds below
       it let the map peek through at the very edge of the cloud front) -->
  <rect x="-2" y="0" width="804" height="330" fill="#f5f0e8"/>

  <!-- a DEEP field of clouds filling the whole bank in overlapping rows,
       so when fully zoomed out the page reads as packed clouds, not a
       single band. flat parchment fill + ink outline (matches the page);
       drawn back row → front row. -->
  <g fill="#f5f0e8" stroke="#2a2118" stroke-opacity="0.5" stroke-width="2"
     stroke-linejoin="round" stroke-linecap="round">
    <!-- row 1 (nearest the screen edge) -->
    <use href="#puff" transform="translate(-50,-6) scale(1.2)"/>
    <use href="#puff" transform="translate(100,4)   scale(1.2)"/>
    <use href="#puff" transform="translate(255,-8)  scale(1.2)"/>
    <use href="#puff" transform="translate(410,2)   scale(1.2)"/>
    <use href="#puff" transform="translate(565,-6)  scale(1.2)"/>
    <use href="#puff" transform="translate(720,2)   scale(1.2)"/>
    <!-- row 2 -->
    <use href="#puff" transform="translate(20,88)   scale(1.3)"/>
    <use href="#puff" transform="translate(185,80)  scale(1.3)"/>
    <use href="#puff" transform="translate(350,90)  scale(1.3)"/>
    <use href="#puff" transform="translate(515,82)  scale(1.3)"/>
    <use href="#puff" transform="translate(680,88)  scale(1.3)"/>
    <use href="#puff" transform="translate(-120,88) scale(1.3)"/>
    <!-- row 3 -->
    <use href="#puff" transform="translate(-40,182) scale(1.25)"/>
    <use href="#puff" transform="translate(120,176) scale(1.25)"/>
    <use href="#puff" transform="translate(290,186) scale(1.25)"/>
    <use href="#puff" transform="translate(455,178) scale(1.25)"/>
    <use href="#puff" transform="translate(620,184) scale(1.25)"/>
    <use href="#puff" transform="translate(785,180) scale(1.25)"/>
    <!-- row 4: the protruding front edge that billows into the map -->
    <use href="#puff" transform="translate(40,272)  scale(1.42)"/>
    <use href="#puff" transform="translate(215,288) scale(1.42)"/>
    <use href="#puff" transform="translate(390,268) scale(1.42)"/>
    <use href="#puff" transform="translate(565,292) scale(1.42)"/>
    <use href="#puff" transform="translate(735,274) scale(1.42)"/>
    <use href="#puff" transform="translate(-90,278) scale(1.42)"/>
  </g>
</svg>
